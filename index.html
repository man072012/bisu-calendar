<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>جامعة بكين للدراسات الدولية · التقويم الدراسي</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Amiri:wght@400;700&family=Reem+Kufi:wght@400;500;600;700&family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap');

  :root {
    --ink-black: #1a1a1a;
    --ink-dark: #2c2318;
    --ink-medium: #5c4a3a;
    --ink-light: #8a7560;
    --parchment: #f5efe0;
    --parchment-deep: #e8dcc8;
    --parchment-light: #faf6ed;
    --vermillion: #c23a2b;
    --vermillion-soft: #d4574a;
    --gold: #b8943e;
    --gold-light: #d4b86a;
    --jade: #4a7c6f;
    --jade-light: #6a9e8e;
    --shadow-ink: rgba(44,35,24,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Naskh Arabic', 'Amiri', serif;
    background: var(--parchment);
    color: var(--ink-dark);
    min-height: 100vh;
    overflow-x: hidden;
    direction: rtl;
    font-feature-settings: 'anum' 0;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.04;
    background-image: radial-gradient(circle at 50% 50%, var(--ink-medium) 1px, transparent 1px);
    background-size: 20px 20px;
    z-index: 0;
  }

  .header {
    position: relative;
    text-align: center;
    padding: 60px 20px 50px;
    background: linear-gradient(180deg, var(--parchment-deep) 0%, var(--parchment) 100%);
    overflow: hidden;
  }

  .header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, transparent, var(--vermillion), var(--gold), var(--vermillion), transparent);
  }

  .header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 80%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--ink-light), transparent);
  }

  .cloud-left, .cloud-right {
    position: absolute;
    top: 20px;
    width: 120px;
    height: 60px;
    opacity: 0.08;
    background: radial-gradient(ellipse, var(--ink-medium) 0%, transparent 70%);
    filter: blur(8px);
  }
  .cloud-left { left: 5%; }
  .cloud-right { right: 5%; }

  .header-seal {
    width: 60px; height: 60px;
    border: 2.5px solid var(--vermillion);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
    transform: rotate(-3deg);
    position: relative;
  }

  .header-seal span {
    font-family: 'Ma Shan Zheng', cursive;
    color: var(--vermillion);
    font-size: 22px;
    line-height: 1.1;
    letter-spacing: 2px;
  }

  .school-name-cn {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: clamp(22px, 4vw, 36px);
    color: var(--ink-medium);
    letter-spacing: 6px;
    margin-bottom: 10px;
    direction: ltr;
  }

  .school-name-ar {
    font-family: 'Reem Kufi', 'Noto Naskh Arabic', serif;
    font-size: clamp(24px, 4.5vw, 42px);
    color: var(--ink-black);
    margin-bottom: 8px;
    font-weight: 700;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.08);
  }

  .semester-title {
    font-family: 'Reem Kufi', serif;
    font-size: clamp(15px, 2.2vw, 20px);
    color: var(--ink-medium);
    letter-spacing: 2px;
    margin-bottom: 10px;
    font-weight: 500;
  }

  .subtitle-line {
    font-size: 13px;
    color: var(--ink-light);
    letter-spacing: 1px;
  }

  .main-content {
    max-width: 1100px;
    margin: 0 auto;
    padding: 30px 20px 60px;
    position: relative;
    z-index: 1;
  }

  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    justify-content: center;
    padding: 20px;
    margin-bottom: 10px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--ink-medium);
  }

  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 2px;
  }

  .month-card {
    background: var(--parchment-light);
    border-radius: 6px;
    margin-bottom: 28px;
    box-shadow: 0 2px 12px var(--shadow-ink), 0 0 0 1px rgba(0,0,0,0.03);
    overflow: hidden;
    animation: fadeUp 0.5s ease both;
    position: relative;
  }

  .month-card::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 4px;
    height: 100%;
    background: linear-gradient(180deg, var(--vermillion), var(--gold));
    opacity: 0.6;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .month-header {
    display: flex;
    align-items: center;
    padding: 16px 24px;
    background: linear-gradient(135deg, rgba(194,58,43,0.06) 0%, transparent 60%);
    border-bottom: 1px solid rgba(0,0,0,0.04);
    gap: 16px;
    flex-wrap: wrap;
  }

  .month-name-ar {
    font-family: 'Reem Kufi', serif;
    font-size: 28px;
    color: var(--ink-dark);
    line-height: 1;
    font-weight: 700;
  }

  .month-name-cn {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 22px;
    color: var(--ink-light);
    direction: ltr;
  }

  .month-name-detail {
    font-size: 13px;
    color: var(--ink-light);
    letter-spacing: 1px;
  }

  .month-weeks-badge {
    margin-right: auto;
    margin-left: 0;
    padding: 3px 12px;
    font-size: 11px;
    color: var(--jade);
    border: 1px solid var(--jade-light);
    border-radius: 20px;
    opacity: 0.8;
  }

  .table-scroll-wrapper {
    width: 100%;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  .cal-table {
    width: 100%;
    min-width: 640px;
    border-collapse: collapse;
    direction: rtl;
    font-feature-settings: 'anum' 0;
  }

  .cal-table thead th {
    padding: 10px 8px;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink-medium);
    text-align: center;
    border-bottom: 1px solid rgba(0,0,0,0.06);
    background: rgba(0,0,0,0.015);
    font-family: 'Noto Naskh Arabic', serif;
  }

  .cal-table thead th:first-child {
    width: 70px;
    color: var(--gold);
  }

  .cal-table thead th:nth-child(7),
  .cal-table thead th:nth-child(8) {
    color: var(--ink-light);
    opacity: 0.7;
  }

  .cal-table tbody td {
    padding: 10px 4px;
    text-align: center;
    font-size: 14px;
    border-bottom: 1px solid rgba(0,0,0,0.025);
    vertical-align: top;
    min-height: 44px;
    position: relative;
    transition: background 0.2s;
  }

  .cal-table tbody tr:hover td {
    background: rgba(194,58,43,0.02);
  }

  .cal-table tbody td:first-child {
    font-family: 'Noto Naskh Arabic', serif;
    font-size: 12px;
    color: var(--gold);
    font-weight: 600;
  }

  .cal-table tbody td:nth-child(7),
  .cal-table tbody td:nth-child(8) {
    color: var(--ink-light);
    opacity: 0.8;
  }

  .day-num {
    display: block;
    font-size: 15px;
    font-weight: 600;
    color: var(--ink-dark);
    margin-bottom: 2px;
    font-family: sans-serif;
  }

  .day-event {
    display: inline-block;
    font-size: 9.5px;
    padding: 1px 6px;
    border-radius: 3px;
    margin-top: 2px;
    line-height: 1.6;
    white-space: nowrap;
    font-family: 'Noto Naskh Arabic', serif;
  }

  .event-holiday { background: linear-gradient(135deg, var(--vermillion), #d45a4a); color: #fff; }
  .event-exam { background: linear-gradient(135deg, var(--gold), var(--gold-light)); color: #fff; }
  .event-register { background: var(--jade); color: #fff; }
  .event-activity { background: var(--ink-medium); color: #fff; }
  .event-notice { background: rgba(0,0,0,0.06); color: var(--ink-medium); }

  .holiday-banners {
    padding: 0 20px 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .holiday-banner {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    border-radius: 6px;
    font-size: 13px;
    line-height: 1.6;
    flex-wrap: wrap;
  }

  .holiday-banner.type-holiday {
    background: linear-gradient(135deg, rgba(194,58,43,0.08), rgba(194,58,43,0.03));
    border-right: 3px solid var(--vermillion);
  }

  .holiday-banner.type-exam {
    background: linear-gradient(135deg, rgba(184,148,62,0.1), rgba(184,148,62,0.03));
    border-right: 3px solid var(--gold);
  }

  .holiday-banner.type-summer {
    background: linear-gradient(135deg, rgba(74,124,111,0.1), rgba(74,124,111,0.03));
    border-right: 3px solid var(--jade);
  }

  .holiday-banner.type-notice {
    background: linear-gradient(135deg, rgba(0,0,0,0.04), rgba(0,0,0,0.01));
    border-right: 3px solid var(--ink-light);
  }

  .banner-icon {
    font-size: 18px;
    flex-shrink: 0;
  }

  .banner-name {
    font-family: 'Reem Kufi', serif;
    font-weight: 700;
    font-size: 14px;
    color: var(--ink-dark);
  }

  .banner-dates {
    color: var(--ink-medium);
    font-size: 12.5px;
  }

  .banner-duration {
    margin-right: auto;
    margin-left: 0;
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
  }

  .type-holiday .banner-duration { background: rgba(194,58,43,0.12); color: var(--vermillion); }
  .type-exam .banner-duration { background: rgba(184,148,62,0.15); color: var(--gold); }
  .type-notice .banner-duration { background: rgba(0,0,0,0.06); color: var(--ink-medium); }
  .type-summer .banner-duration { background: rgba(74,124,111,0.15); color: var(--jade); }

  .notes-section {
    background: var(--parchment-light);
    border-radius: 6px;
    padding: 24px 28px;
    box-shadow: 0 2px 12px var(--shadow-ink);
    position: relative;
    margin-top: 10px;
  }

  .notes-section::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 4px; height: 100%;
    background: var(--jade);
    border-radius: 0 6px 6px 0;
    opacity: 0.6;
  }

  .notes-title {
    font-family: 'Reem Kufi', serif;
    font-size: 22px;
    color: var(--ink-dark);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 700;
  }

  .notes-title::before {
    content: '※';
    color: var(--vermillion);
    font-size: 14px;
  }

  .notes-content {
    font-size: 15px;
    line-height: 2.2;
    color: var(--ink-medium);
  }

  .notes-content p {
    margin-bottom: 6px;
    padding-right: 12px;
    border-right: 2px solid transparent;
    transition: border-color 0.3s;
  }

  .notes-content p:hover {
    border-right-color: var(--gold-light);
  }

  .footer {
    text-align: center;
    padding: 30px;
    font-size: 12px;
    color: var(--ink-light);
    letter-spacing: 2px;
  }

  .footer::before {
    content: '— ◆ —';
    display: block;
    margin-bottom: 12px;
    color: var(--gold-light);
    font-size: 10px;
    letter-spacing: 8px;
  }

  .footer-cn {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 14px;
    color: var(--ink-light);
    direction: ltr;
    margin-top: 4px;
  }

  .brush-corner {
    position: absolute;
    width: 40px; height: 40px;
    opacity: 0.08;
  }
  .brush-corner.tr { top: 8px; right: 12px; border-top: 2px solid var(--ink-dark); border-right: 2px solid var(--ink-dark); }
  .brush-corner.bl { bottom: 8px; left: 12px; border-bottom: 2px solid var(--ink-dark); border-left: 2px solid var(--ink-dark); }

  @media (max-width: 768px) {
    .header { padding: 40px 16px 30px; }
    .month-header { padding: 12px 16px; }
    .cal-table thead th, .cal-table tbody td { padding: 8px 3px; font-size: 12px; }
    .day-num { font-size: 13px; }
    .day-event { font-size: 8.5px; padding: 1px 4px; }
    .notes-section { padding: 16px; }
    .month-name-ar { font-size: 22px; }
    .month-name-cn { font-size: 18px; }
  }

  @media (max-width: 480px) {
    .cal-table thead th { font-size: 11px; }
    .cal-table tbody td:first-child { font-size: 10px; }
    .month-weeks-badge { display: none; }
    .month-name-cn { display: none; }
  }
</style>

function getEventClass(type) {
  return { holiday:'event-holiday', exam:'event-exam', register:'event-register', activity:'event-activity', notice:'event-notice' }[type] || 'event-notice';
}

function toArabicNum(n) {
  return String(n);
}

function renderCalendar() {
  const data = calendarData['chaoyang'];
  const container = document.getElementById('calendar-container');
  let html = '';

  data.months.forEach((month, mi) => {
    const holidays = holidaySummaries[month.nameAr] || [];
    let bannersHtml = '';
    if (holidays.length > 0) {
      bannersHtml = '<div class="holiday-banners">';
      holidays.forEach(h => {
        bannersHtml += `
          <div class="holiday-banner type-${h.type}">
            <span class="banner-icon">${h.icon}</span>
            <span class="banner-name">${h.name}</span>
            <span class="banner-dates">${h.dates}</span>
            <span class="banner-duration">${h.duration}</span>
          </div>`;
      });
      bannersHtml += '</div>';
    }

    html += `<div class="month-card" style="animation-delay:${mi*0.06}s">
      <div class="month-header">
        <span class="month-name-ar">${month.nameAr}</span>
        <span class="month-name-cn">${month.nameCn}</span>
        <span class="month-name-detail">${month.detail}</span>
        <span class="month-weeks-badge">${month.weeks}</span>
      </div>
      ${bannersHtml}
      <div class="table-scroll-wrapper">
      <table class="cal-table">
        <thead><tr>
          <th scope="col">الأسبوع</th>
          <th scope="col">الاثنين</th>
          <th scope="col">الثلاثاء</th>
          <th scope="col">الأربعاء</th>
          <th scope="col">الخميس</th>
          <th scope="col">الجمعة</th>
          <th scope="col">السبت</th>
          <th scope="col">الأحد</th>
        </tr></thead><tbody>`;

    month.rows.forEach(row => {
      html += `<tr><td>${row.week}</td>`;
      row.days.forEach(day => {
        if (!day?.d) {
          html += '<td></td>';
        } else {
          const ev = day.ev ? `<span class="day-event ${getEventClass(day.type)}">${day.ev}</span>` : '';
          html += `<td><span class="day-num">${toArabicNum(day.d)}</span>${ev}</td>`;
        }
      });
      html += '</tr>';
    });
    html += '</tbody></table></div></div>';
  });

  container.innerHTML = html;
  document.getElementById('notes-content').innerHTML = data.notes.map(n => `<p>${n}</p>`).join('');
}

renderCalendar();
</script>
